---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chris-nginx
  namespace: argocd
spec:
  project: default

  source:
    repoURL: oci://ghcr.io/chris530/charts
    chart: chris-nginx
    targetRevision: 0.1.0

  destination:
    server: https://kubernetes.default.svc
    namespace: chris-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
