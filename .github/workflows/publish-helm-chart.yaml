name: Publish Helm Charts to GHCR

on:
  push:
    branches:
      - main
    paths:
      - "helm/**"
      - ".github/workflows/publish-helm-chart.yaml"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Lint, package, and push Helm charts
        run: |
          set -euo pipefail

          mkdir -p ./dist

          for chart in ./helm/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Processing chart: $chart"

              helm lint "$chart"
              helm package "$chart" --destination ./dist

              CHART_PACKAGE=$(find ./dist -maxdepth 1 -name "*.tgz" -newer "$chart/Chart.yaml" | head -n 1)

              echo "Pushing package: $CHART_PACKAGE"
              helm push "$CHART_PACKAGE" oci://ghcr.io/chris530/charts
            fi
          done
