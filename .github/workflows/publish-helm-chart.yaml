# .github/workflows/publish-helm-chart.yaml
name: Publish Helm Chart to GHCR

on:
  push:
    branches:
      - main
    paths:
      - "helm/**"
      - ".github/workflows/publish-helm-chart.yaml"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package Helm chart
        run: |
          helm lint ./helm
          helm package ./helm --destination ./dist

      - name: Push Helm chart to GHCR
        run: |
          CHART_PACKAGE=$(ls ./dist/*.tgz)
          helm push "$CHART_PACKAGE" oci://ghcr.io/chris530/charts
